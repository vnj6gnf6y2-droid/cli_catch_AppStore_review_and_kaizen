name: CI

on:
  push:
    branches: [main, genspark_ai_developer]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/
          ruff format --check src/

      - name: Type check with mypy
        run: |
          mypy --strict src/appreview/
        continue-on-error: true  # mypy strict may have some issues on first run

      - name: Run tests (excluding live tests)
        run: |
          pytest tests/ -m "not live" --cov=src/appreview --cov-report=xml --cov-report=term-missing -q
        env:
          PYTHONPATH: src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
